  <circle cx="32" cy="30" r="20" fill="url(#glow)"/>
  <!-- Border -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- M Letter -->
  <path d="M16 46 L16 22 L25 36 L32 22 L32 36 L41 22 L48 22 L48 46" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
